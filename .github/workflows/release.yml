name: AveGram Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  build:
    name: Build AveGram
    runs-on: ubuntu-latest
    env:
      NATIVE_TARGET: "arm64-v8a"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Gradlew Permission
        run: chmod +x gradlew

      - name: Set Up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set Up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "build-tools;36.0.0 ndk;27.2.12479018 platforms;android-36"

      - name: Configure SDK path
        run: echo "sdk.dir=${ANDROID_HOME}" >> local.properties

      - name: Build AveGram
        run: ./gradlew TMessagesProj:assembleRelease
        env:
          KEYSTORE_PASS: android
          ALIAS_NAME: androidkey
          ALIAS_PASS: android

      - name: Finding APK
        run: |
          APK=$(find TMessagesProj/build/outputs/apk -name '*.apk' | head -1)
          echo "APK_PATH=$APK" >> $GITHUB_ENV
          echo "Found APK: $APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AveGram-build-complete
          path: TMessagesProj/build/outputs/apk/
          retention-days: 30
          
